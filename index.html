<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design System</title>
    <meta name="description" content="A premium, dynamic design system with a modern aesthetic">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="container">
        <header class="hero">
            <h1 class="gradient-text">Design System</h1>
            <p class="subtitle">A premium UI library built with flexiblity and modern aesthetics.</p>
        </header>

        <section class="components-grid">
            <div class="glass-card interactive">
                <h3>Glassmorphism</h3>
                <p>Beautiful translucent backgrounds with subtle blurs and borders.</p>
                <button class="btn primary">Explore Components</button>
            </div>
            
            <div class="glass-card interactive">
                <h3>Dynamic Animations</h3>
                <p>Micro-interactions that make the interface feel alive and responsive.</p>
                <button class="btn secondary">View Principles</button>
            </div>
        </section>
    </main>
</body>
</html>
